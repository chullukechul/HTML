<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破解三角函數視覺儀</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel (用來讓瀏覽器看懂 JSX 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- React 渲染的目標節點 -->
    <div id="root"></div>

    <!-- 注意這裡的 type 是 text/babel，代表要交給 Babel 處理 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('circle');

            // Task 1: Unit Circle State
            const [angle, setAngle] = useState(23);

            // Task 2: Wave State
            const [baseFunc, setBaseFunc] = useState('sin');
            const [a, setA] = useState(1);
            const [b, setB] = useState(1);
            const [c, setC] = useState(0);
            const [d, setD] = useState(0);

            // Helper to format Pi values nicely
            const formatPi = (val) => {
                if (val === 0) return '0';
                if (val === 1) return 'π';
                if (val === -1) return '-π';
                if (val === 0.5) return 'π/2';
                if (val === -0.5) return '-π/2';
                return `${val}π`;
            };

            return (
                <div className="flex flex-col min-h-screen bg-gray-50 font-sans sm:max-w-md sm:mx-auto shadow-lg">
                    {/* Header */}
                    <header className="bg-indigo-600 text-white p-4 shadow-md z-10">
                        <h1 className="text-xl font-bold text-center">破解三角函數視覺儀</h1>
                        <p className="text-indigo-200 text-xs text-center mt-1">專為手機操作設計</p>
                    </header>

                    {/* Tabs */}
                    <div className="flex bg-white shadow-sm sticky top-0 z-10">
                        <button
                            onClick={() => setActiveTab('circle')}
                            className={`flex-1 py-3 text-center font-medium transition-colors border-b-4 ${
                                activeTab === 'circle' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-gray-500 hover:bg-gray-50'
                            }`}
                        >
                            任務一：動態單位圓
                        </button>
                        <button
                            onClick={() => setActiveTab('wave')}
                            className={`flex-1 py-3 text-center font-medium transition-colors border-b-4 ${
                                activeTab === 'wave' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-gray-500 hover:bg-gray-50'
                            }`}
                        >
                            任務二：波形疊影
                        </button>
                    </div>

                    {/* Content Area */}
                    <main className="flex-1 flex flex-col p-4 overflow-y-auto">
                        {activeTab === 'circle' ? (
                            <UnitCircleView angle={angle} setAngle={setAngle} />
                        ) : (
                            <WaveTransformView 
                                baseFunc={baseFunc} setBaseFunc={setBaseFunc}
                                a={a} setA={setA} 
                                b={b} setB={setB} 
                                c={c} setC={setC} 
                                d={d} setD={setD} 
                                formatPi={formatPi}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const UnitCircleView = ({ angle, setAngle }) => {
            const rad = (angle * Math.PI) / 180;
            const sinVal = Math.sin(rad);
            const cosVal = Math.cos(rad);

            const px = cosVal;
            const py = -sinVal;

            return (
                <div className="flex flex-col h-full space-y-6">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                        <h2 className="text-lg font-bold text-gray-800 mb-2">比大小：sin(23°) vs sin(77°)</h2>
                        <p className="text-sm text-gray-600 text-center mb-4">
                            試著將角度滑到 23° 和 77°，觀察<span className="text-red-500 font-bold">紅線 (sin)</span>與<span className="text-blue-500 font-bold">藍線 (cos)</span>的長短變化。
                        </p>
                        
                        <div className="relative w-full aspect-square max-w-[300px] mx-auto bg-slate-50 rounded-xl overflow-hidden border border-slate-200">
                            <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full">
                                <line x1="-1.2" y1="0" x2="1.2" y2="0" stroke="#cbd5e1" strokeWidth="0.01" />
                                <line x1="0" y1="-1.2" x2="0" y2="1.2" stroke="#cbd5e1" strokeWidth="0.01" />
                                <circle cx="0" cy="0" r="1" fill="none" stroke="#94a3b8" strokeWidth="0.015" strokeDasharray="0.05 0.05" />
                                <path d={`M 0.3 0 A 0.3 0.3 0 ${angle > 180 ? 1 : 0} 0 ${0.3 * Math.cos(rad)} ${-0.3 * Math.sin(rad)}`} fill="none" stroke="#8b5cf6" strokeWidth="0.02" />
                                <line x1="0" y1="0" x2={px} y2="0" stroke="#3b82f6" strokeWidth="0.04" strokeLinecap="round" />
                                <line x1={px} y1="0" x2={px} y2={py} stroke="#ef4444" strokeWidth="0.04" strokeLinecap="round" />
                                <line x1="0" y1="0" x2={px} y2={py} stroke="#1e293b" strokeWidth="0.02" />
                                <circle cx={px} cy={py} r="0.05" fill="#1e293b" />
                            </svg>
                            <div className="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-xs shadow-sm font-mono border border-gray-100">
                                θ = {angle}°
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                        <div>
                            <label className="flex justify-between text-sm font-bold text-gray-700 mb-2">
                                <span>滑動角度 (θ)</span>
                                <span className="text-indigo-600">{angle}°</span>
                            </label>
                            <input type="range" min="0" max="360" value={angle} onChange={(e) => setAngle(Number(e.target.value))}
                                className="w-full h-2 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                        <div className="grid grid-cols-2 gap-4 mt-4">
                            <div className="bg-red-50 p-3 rounded-xl border border-red-100 text-center">
                                <div className="text-red-500 font-bold text-sm mb-1">y軸投影 (對邊)</div>
                                <div className="text-red-600 font-mono font-bold text-lg">sin θ = {sinVal.toFixed(3)}</div>
                            </div>
                            <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center">
                                <div className="text-blue-500 font-bold text-sm mb-1">x軸投影 (鄰邊)</div>
                                <div className="text-blue-600 font-mono font-bold text-lg">cos θ = {cosVal.toFixed(3)}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const WaveTransformView = ({ baseFunc, setBaseFunc, a, setA, b, setB, c, setC, d, setD, formatPi }) => {
            const viewBoxWidth = 400;
            const viewBoxHeight = 200;
            
            const mapX = (x) => ((x + 2 * Math.PI) / (4 * Math.PI)) * viewBoxWidth;
            const mapY = (y) => viewBoxHeight / 2 - (y / 4) * (viewBoxHeight / 2);

            const generatePath = (funcType, amp, freq, phase, vShift) => {
                let points = [];
                for (let x = -2 * Math.PI; x <= 2 * Math.PI; x += 0.05) {
                    const val = funcType === 'sin' 
                        ? Math.sin(freq * x + phase * Math.PI) 
                        : Math.cos(freq * x + phase * Math.PI);
                    const y = amp * val + vShift;
                    points.push(`${mapX(x)},${mapY(y)}`);
                }
                return points.join(' ');
            };

            const basePath = generatePath(baseFunc, 1, 1, 0, 0);
            const activePath = generatePath(baseFunc, a, b, c, d);

            return (
                <div className="flex flex-col h-full space-y-4">
                    <div className="flex justify-center space-x-2">
                        <button onClick={() => setBaseFunc('sin')} className={`px-6 py-2 rounded-full font-bold text-sm transition-all ${baseFunc === 'sin' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-200 text-gray-600'}`}>y = sin(x)</button>
                        <button onClick={() => setBaseFunc('cos')} className={`px-6 py-2 rounded-full font-bold text-sm transition-all ${baseFunc === 'cos' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-200 text-gray-600'}`}>y = cos(x)</button>
                    </div>

                    <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                        <div className="text-center mb-2 font-mono text-lg font-bold text-indigo-700">
                            y = {a !== 1 ? a : ''} {baseFunc}({b !== 1 ? b : ''}x {c > 0 ? `+ ${formatPi(c)}` : c < 0 ? `- ${formatPi(Math.abs(c))}` : ''}) {d > 0 ? `+ ${d}` : d < 0 ? `- ${Math.abs(d)}` : ''}
                        </div>
                        
                        <div className="relative w-full aspect-[2/1] bg-slate-50 rounded-xl overflow-hidden border border-slate-200">
                            <svg viewBox={`0 0 ${viewBoxWidth} ${viewBoxHeight}`} className="w-full h-full">
                                {[ -3, -2, -1, 0, 1, 2, 3].map(val => (
                                    <line key={`y-${val}`} x1="0" y1={mapY(val)} x2={viewBoxWidth} y2={mapY(val)} stroke={val === 0 ? "#94a3b8" : "#e2e8f0"} strokeWidth={val === 0 ? "1.5" : "0.5"} />
                                ))}
                                
                                {[-2, -1.5, -1, -0.5, 0, 0.5, 1, 1.5, 2].map(val => {
                                    const xPos = mapX(val * Math.PI);
                                    const isMainAxis = val === 0;
                                    return (
                                        <g key={`x-${val}`}>
                                            <line x1={xPos} y1="0" x2={xPos} y2={viewBoxHeight} stroke={isMainAxis ? "#94a3b8" : "#e2e8f0"} strokeWidth={isMainAxis ? "1.5" : "0.5"} />
                                            {val % 0.5 === 0 && val !== 0 && (
                                                <text x={xPos} y={mapY(0) + 14} fontSize="10" fill="#64748b" textAnchor="middle">{formatPi(val)}</text>
                                            )}
                                        </g>
                                    );
                                })}

                                <polyline points={basePath} fill="none" stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />
                                <polyline points={activePath} fill="none" stroke="#6366f1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                            <div className="absolute top-2 right-2 bg-white/90 p-1.5 rounded shadow-sm border border-gray-100 flex flex-col gap-1 text-[10px]">
                                <div className="flex items-center gap-1"><div className="w-3 h-0.5 border-b border-dashed border-slate-400"></div> 基本型</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-0.5 bg-indigo-500"></div> 變化型</div>
                            </div>
                        </div>

                        <div className="flex justify-between mt-3 px-2 text-xs font-medium text-gray-600">
                            <span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded">週期 = {formatPi(2/Math.abs(b))}</span>
                            <span className="bg-emerald-50 text-emerald-700 px-2 py-1 rounded">極大 = {Math.abs(a) + d} / 極小 = {-Math.abs(a) + d}</span>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-5 pb-8">
                        <div>
                            <label className="flex justify-between text-sm font-bold text-gray-700 mb-1">
                                <span>振幅 (a) - 上下伸縮</span>
                                <span className="text-indigo-600">{a}</span>
                            </label>
                            <input type="range" min="0.5" max="3" step="0.5" value={a} onChange={(e) => setA(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                        <div>
                            <label className="flex justify-between text-sm font-bold text-gray-700 mb-1">
                                <span>週期倍率 (b) - 左右壓縮</span>
                                <span className="text-indigo-600">{b}</span>
                            </label>
                            <input type="range" min="0.5" max="3" step="0.5" value={b} onChange={(e) => setB(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                            <p className="text-[10px] text-gray-400 mt-1">b=2 代表波被壓縮一半喔！</p>
                        </div>
                        <div>
                            <label className="flex justify-between text-sm font-bold text-gray-700 mb-1">
                                <span>平移 (c) - 左右移動</span>
                                <span className="text-indigo-600">{c > 0 ? `左移 ${formatPi(c)}` : c < 0 ? `右移 ${formatPi(Math.abs(c))}` : '0'}</span>
                            </label>
                            <input type="range" min="-1" max="1" step="0.25" value={c} onChange={(e) => setC(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                        <div>
                            <label className="flex justify-between text-sm font-bold text-gray-700 mb-1">
                                <span>上下平移 (d)</span>
                                <span className="text-indigo-600">{d}</span>
                            </label>
                            <input type="range" min="-2" max="2" step="1" value={d} onChange={(e) => setD(Number(e.target.value))} className="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                        </div>
                    </div>
                </div>
            );
        };

        // 將 App 渲染到畫面上
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
